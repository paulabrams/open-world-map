<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point-Crawl Map — Treasure Map Style</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #3a3428;
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    overflow: hidden;
  }
  #map-container {
    width: 100vw;
    height: 100vh;
    cursor: grab;
  }
  #map-container:active { cursor: grabbing; }

  #detail-panel {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    width: 300px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    background: #f0e6cc;
    border: 1.5px solid #5a7a9a;
    padding: 20px;
    font-size: 14px;
    color: #3a5a7a;
    box-shadow: 3px 3px 10px rgba(0,0,0,0.2);
  }
  #detail-panel.open { display: block; }
  #detail-panel h2 {
    color: #3a5a7a;
    font-size: 17px;
    margin-bottom: 4px;
    font-style: italic;
  }
  #detail-panel .point-type {
    font-style: italic;
    color: #7a8a7a;
    font-size: 12px;
    margin-bottom: 12px;
  }
  #detail-panel .description {
    line-height: 1.6;
    margin-bottom: 12px;
    font-style: italic;
  }
  #detail-panel .connections {
    border-top: 1px solid #8aaarr;
    border-top: 1px solid #9ab0c8;
    padding-top: 10px;
    font-size: 13px;
  }
  #detail-panel .connections h3 {
    font-size: 13px;
    color: #3a5a7a;
    margin-bottom: 6px;
  }
  #detail-panel .connections li {
    margin-bottom: 4px;
    list-style: none;
  }
  #detail-panel .close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    cursor: pointer;
    font-size: 18px;
    color: #7a9ab8;
    background: none;
    border: none;
    font-family: inherit;
  }

  #title-bar {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #7a9ab8;
    font-size: 11px;
    font-style: italic;
    opacity: 0.6;
    pointer-events: none;
  }
</style>
</head>
<body>

<div id="map-container">
  <svg id="map"></svg>
</div>

<div id="detail-panel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <h2 id="panel-name"></h2>
  <div class="point-type" id="panel-type"></div>
  <div class="description" id="panel-desc"></div>
  <div class="connections" id="panel-connections"></div>
</div>

<div id="title-bar"></div>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// --- Thror's Map / Treasure Map Style Constants ---
// Pale faded blue ink — the dominant color, like old blueprint ink
const BLUE_INK = "#3a6590";
const BLUE_LIGHT = "#6a90b0";
const BLUE_FAINT = "#90b0cc";
// Red accent — for key features, danger, dragons
const RED_INK = "#a03020";
const RED_LIGHT = "#c05040";
// Parchment — aged, warm
const PARCHMENT = "#f0e6cc";
const PARCHMENT_DARK = "#d8ccaa";
// Dark ink — used sparingly for emphasis
const DARK_INK = "#3a3a30";

const WIDTH = window.innerWidth;
const HEIGHT = window.innerHeight;
const HINT_SCALE = 3;
const DAY_SCALE = 100;

// --- Seeded random ---
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seedFromString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

// --- Terrain Symbols (minimal, sparse — treasure map style) ---

function drawMountainSketch(g, x, y, size, rng) {
  // Very simple peaked outline — just a caret shape, minimal
  const w = size * (0.7 + rng() * 0.3);
  const h = size * (1.0 + rng() * 0.4);
  const skew = (rng() - 0.5) * w * 0.1;

  g.append("path")
    .attr("d", `M ${x - w/2} ${y} L ${x + skew} ${y - h} L ${x + w/2} ${y}`)
    .attr("fill", "none")
    .attr("stroke", BLUE_INK)
    .attr("stroke-width", 0.8)
    .attr("opacity", 0.7);
}

function drawSparseTree(g, x, y, size, rng) {
  // Just a small simple circle — minimal canopy dot
  const r = size * (0.2 + rng() * 0.15);
  g.append("circle")
    .attr("cx", x).attr("cy", y)
    .attr("r", r)
    .attr("fill", "none")
    .attr("stroke", BLUE_INK)
    .attr("stroke-width", 0.6)
    .attr("opacity", 0.5);
}

function drawSwampMark(g, x, y, size, rng) {
  // A few small wavy lines — very spare
  for (let i = 0; i < 2; i++) {
    const ly = y + i * size * 0.35;
    const lx = x - size * 0.3;
    const d = `M ${lx} ${ly} Q ${lx + size * 0.15} ${ly - size * 0.08} ${lx + size * 0.3} ${ly} Q ${lx + size * 0.45} ${ly + size * 0.08} ${lx + size * 0.6} ${ly}`;
    g.append("path")
      .attr("d", d)
      .attr("fill", "none")
      .attr("stroke", BLUE_INK)
      .attr("stroke-width", 0.6)
      .attr("opacity", 0.5);
  }
}

function drawDesolationDots(g, x, y, size, rng) {
  // Scattered small dots — like "The Desolation of Smaug" markings
  const count = 4 + Math.floor(rng() * 3);
  for (let i = 0; i < count; i++) {
    const dx = (rng() - 0.5) * size * 1.2;
    const dy = (rng() - 0.5) * size * 0.8;
    g.append("circle")
      .attr("cx", x + dx).attr("cy", y + dy)
      .attr("r", 0.8 + rng() * 0.5)
      .attr("fill", BLUE_INK)
      .attr("opacity", 0.4);
  }
}

// --- Terrain symbol placement (very sparse) ---
function renderTerrainSymbols(container, nodes, links) {
  const terrainGroup = container.append("g").attr("class", "terrain");

  nodes.forEach(node => {
    const rng = mulberry32(seedFromString(node.id));

    const connected = links.filter(l =>
      (l.source.id || l.source) === node.id || (l.target.id || l.target) === node.id
    );
    let avgAngle = -Math.PI / 2;
    if (connected.length > 0) {
      let sx = 0, sy = 0;
      connected.forEach(l => {
        const other = (l.source.id || l.source) === node.id ? l.target : l.source;
        if (other.x !== undefined) {
          sx += other.x - node.x;
          sy += other.y - node.y;
        }
      });
      avgAngle = Math.atan2(sy, sx);
    }
    const placeAngle = avgAngle + Math.PI;
    const offset = 30;

    if (node.terrain === "mountains") {
      // Just 1-2 simple peaks
      const count = 1 + Math.floor(rng() * 2);
      for (let i = 0; i < count; i++) {
        const spread = (i - (count - 1) / 2) * 14;
        const mx = node.x + Math.cos(placeAngle) * offset + Math.cos(placeAngle + Math.PI / 2) * spread;
        const my = node.y + Math.sin(placeAngle) * offset + Math.sin(placeAngle + Math.PI / 2) * spread;
        drawMountainSketch(terrainGroup, mx, my, 10 + rng() * 4, rng);
      }
    } else if (node.terrain === "forest") {
      // A few sparse tree dots
      const count = 3 + Math.floor(rng() * 2);
      for (let i = 0; i < count; i++) {
        const a = placeAngle + (rng() - 0.5) * 1.0;
        const r = offset * (0.6 + rng() * 0.5);
        drawSparseTree(terrainGroup, node.x + Math.cos(a) * r, node.y + Math.sin(a) * r, 8 + rng() * 3, rng);
      }
    } else if (node.terrain === "swamp") {
      drawSwampMark(terrainGroup,
        node.x + Math.cos(placeAngle) * offset,
        node.y + Math.sin(placeAngle) * offset, 18, rng);
    } else if (node.terrain === "plains") {
      drawDesolationDots(terrainGroup,
        node.x + Math.cos(placeAngle) * offset,
        node.y + Math.sin(placeAngle) * offset, 20, rng);
    }
  });
}

// --- Node icons (simple, hand-drawn marks in blue ink) ---
function renderNodes(container, nodes) {
  const nodeGroup = container.append("g").attr("class", "nodes");

  nodes.forEach(node => {
    const g = nodeGroup.append("g")
      .attr("transform", `translate(${node.x}, ${node.y})`)
      .attr("class", "node")
      .style("cursor", "pointer")
      .on("click", (event) => { event.stopPropagation(); showDetail(node); });

    const isLocal = node.scale === "local";
    const s = isLocal ? 3.5 : 5;
    // Lairs and dungeons get red; everything else blue
    const isDanger = node.point_type === "lair" || node.point_type === "dungeon";
    const color = isDanger ? RED_INK : BLUE_INK;

    switch (node.point_type) {
      case "heart":
        g.append("circle").attr("r", 6).attr("fill", color).attr("stroke", "none").attr("opacity", 0.8);
        g.append("circle").attr("r", 8).attr("fill", "none").attr("stroke", color).attr("stroke-width", 1.0);
        break;
      case "fortress":
        g.append("rect").attr("x", -s).attr("y", -s).attr("width", s*2).attr("height", s*2)
          .attr("fill", "none").attr("stroke", color).attr("stroke-width", 1.0);
        // Small flag
        g.append("line").attr("x1", 0).attr("y1", -s).attr("x2", 0).attr("y2", -s - 6)
          .attr("stroke", color).attr("stroke-width", 0.8);
        g.append("path").attr("d", `M 0 ${-s - 6} L 4 ${-s - 4.5} L 0 ${-s - 3}`)
          .attr("fill", color).attr("opacity", 0.7);
        break;
      case "tavern":
        g.append("rect").attr("x", -2.5).attr("y", -2.5).attr("width", 5).attr("height", 5)
          .attr("fill", color).attr("stroke", "none").attr("opacity", 0.7);
        break;
      case "settlement":
        g.append("circle").attr("r", s).attr("fill", color).attr("stroke", "none").attr("opacity", 0.7);
        break;
      case "wilderness":
        g.append("circle").attr("r", s).attr("fill", "none").attr("stroke", color).attr("stroke-width", 0.8);
        break;
      case "dungeon": {
        // X mark for danger
        const d = s * 1.2;
        g.append("line").attr("x1", -d).attr("y1", -d).attr("x2", d).attr("y2", d)
          .attr("stroke", color).attr("stroke-width", 1.5);
        g.append("line").attr("x1", d).attr("y1", -d).attr("x2", -d).attr("y2", d)
          .attr("stroke", color).attr("stroke-width", 1.5);
        break;
      }
      case "sanctuary":
        g.append("circle").attr("r", s).attr("fill", "none").attr("stroke", color).attr("stroke-width", 0.8);
        g.append("circle").attr("r", 1.5).attr("fill", color);
        break;
      case "tower":
        // Simple vertical line with dot
        g.append("line").attr("x1", 0).attr("y1", -s - 3).attr("x2", 0).attr("y2", s + 1)
          .attr("stroke", color).attr("stroke-width", 1.0);
        g.append("circle").attr("cx", 0).attr("cy", -s - 4).attr("r", 1.5)
          .attr("fill", color);
        break;
      case "ruin":
        g.append("rect").attr("x", -s).attr("y", -s).attr("width", s*2).attr("height", s*2)
          .attr("fill", "none").attr("stroke", color).attr("stroke-width", 0.8)
          .attr("stroke-dasharray", "2 2").attr("opacity", 0.7);
        break;
      case "waypoint":
        g.append("circle").attr("r", 2).attr("fill", color).attr("opacity", 0.6);
        break;
      case "lair": {
        // Red X mark — here be danger
        const d = s * 1.3;
        g.append("line").attr("x1", -d).attr("y1", -d).attr("x2", d).attr("y2", d)
          .attr("stroke", color).attr("stroke-width", 2.0);
        g.append("line").attr("x1", d).attr("y1", -d).attr("x2", -d).attr("y2", d)
          .attr("stroke", color).attr("stroke-width", 2.0);
        break;
      }
      default:
        g.append("circle").attr("r", 3).attr("fill", color).attr("opacity", 0.6);
    }
  });
}

// --- Path/link rendering (thin blue lines, rivers blue and wavy) ---
function renderLinks(container, links) {
  const linkGroup = container.append("g").attr("class", "links");

  links.forEach(link => {
    const sx = link.source.x, sy = link.source.y;
    const tx = link.target.x, ty = link.target.y;

    const dx = tx - sx, dy = ty - sy;
    const len = Math.sqrt(dx * dx + dy * dy);
    const rng = mulberry32(seedFromString(link.name || "link"));
    const curvature = (rng() - 0.5) * len * 0.12;
    const nx = -dy / len, ny = dx / len;
    const cx = (sx + tx) / 2 + nx * curvature;
    const cy = (sy + ty) / 2 + ny * curvature;

    let pathD;
    if (link.path_type === "river") {
      const segments = 8;
      let pts = [`M ${sx} ${sy}`];
      for (let i = 1; i <= segments; i++) {
        const t = i / segments;
        const tPrev = (i - 0.5) / segments;
        const px = (1 - tPrev) * (1 - tPrev) * sx + 2 * (1 - tPrev) * tPrev * cx + tPrev * tPrev * tx;
        const py = (1 - tPrev) * (1 - tPrev) * sy + 2 * (1 - tPrev) * tPrev * cy + tPrev * tPrev * ty;
        const ex = (1 - t) * (1 - t) * sx + 2 * (1 - t) * t * cx + t * t * tx;
        const ey = (1 - t) * (1 - t) * sy + 2 * (1 - t) * t * cy + t * t * ty;
        const wave = (i % 2 === 0 ? 1 : -1) * 4;
        const cpx = px + nx * wave;
        const cpy = py + ny * wave;
        pts.push(`Q ${cpx} ${cpy} ${ex} ${ey}`);
      }
      pathD = pts.join(" ");
    } else {
      pathD = `M ${sx} ${sy} Q ${cx} ${cy} ${tx} ${ty}`;
    }

    const path = linkGroup.append("path")
      .attr("d", pathD)
      .attr("fill", "none")
      .attr("stroke", BLUE_INK)
      .attr("stroke-linecap", "round");

    switch (link.path_type) {
      case "road":
        path.attr("stroke-width", 2.0);
        break;
      case "trail":
        path.attr("stroke-width", 1.0).attr("stroke-dasharray", "5 4");
        break;
      case "wilderness":
        path.attr("stroke-width", 0.8).attr("stroke-dasharray", "2 4");
        break;
      case "river":
        path.attr("stroke-width", 2.0);
        break;
      default:
        path.attr("stroke-width", 1.2);
    }
  });
}

// --- Day labels ---
function renderDayLabels(container, links) {
  const labelGroup = container.append("g").attr("class", "day-labels");

  links.forEach(link => {
    if (!link.days || link.days < 0.25 || link.path_type === "river") return;

    const sx = link.source.x, sy = link.source.y;
    const tx = link.target.x, ty = link.target.y;
    const mx = (sx + tx) / 2, my = (sy + ty) / 2;

    const text = link.days === 1 ? "1 day" : link.days + " days";

    labelGroup.append("text")
      .attr("x", mx)
      .attr("y", my + 3)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
      .attr("font-size", "8px")
      .attr("font-style", "italic")
      .attr("fill", BLUE_LIGHT)
      .attr("stroke", PARCHMENT)
      .attr("stroke-width", 2)
      .attr("paint-order", "stroke")
      .text(text);
  });
}

// --- Labels (blue ink, italic, hand-lettered feel) ---
function renderLabels(container, nodes) {
  const labelGroup = container.append("g").attr("class", "labels");

  nodes.forEach(node => {
    const isLocal = node.scale === "local";
    const isDanger = node.point_type === "lair" || node.point_type === "dungeon";
    const isImportant = node.point_type === "heart" || node.point_type === "fortress";
    const fontSize = isLocal ? 10 : (isImportant ? 16 : 13);
    const color = isDanger ? RED_INK : (isLocal ? BLUE_LIGHT : BLUE_INK);
    const yOffset = isLocal ? 12 : 16;

    const text = labelGroup.append("text")
      .attr("x", node.x)
      .attr("y", node.y + yOffset)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
      .attr("font-size", fontSize + "px")
      .attr("font-style", "italic")
      .attr("fill", color)
      .attr("stroke", PARCHMENT)
      .attr("stroke-width", 2.5)
      .attr("paint-order", "stroke")
      .text(node.name);

    // Important places get slight letter-spacing
    if (isImportant) {
      text.attr("letter-spacing", "2.5px");
    }
  });
}

// --- Decorative runic border panels ---
function renderRunicBorder(container, bounds) {
  const pad = 50;
  const x = bounds.minX - pad;
  const y = bounds.minY - pad;
  const w = bounds.maxX - bounds.minX + pad * 2;
  const h = bounds.maxY - bounds.minY + pad * 2;

  // Single thin blue border — strengthened
  container.append("rect")
    .attr("x", x).attr("y", y)
    .attr("width", w).attr("height", h)
    .attr("fill", "none")
    .attr("stroke", BLUE_LIGHT)
    .attr("stroke-width", 1.2)
    .attr("opacity", 0.8);

  // Decorative corner marks — larger
  const cm = 12;
  const corners = [
    [x, y], [x + w, y], [x, y + h], [x + w, y + h]
  ];
  corners.forEach(([cx, cy]) => {
    const sx = cx === x ? 1 : -1;
    const sy = cy === y ? 1 : -1;
    container.append("line")
      .attr("x1", cx).attr("y1", cy)
      .attr("x2", cx + cm * sx).attr("y2", cy)
      .attr("stroke", BLUE_INK).attr("stroke-width", 1.0);
    container.append("line")
      .attr("x1", cx).attr("y1", cy)
      .attr("x2", cx).attr("y2", cy + cm * sy)
      .attr("stroke", BLUE_INK).attr("stroke-width", 1.0);
  });

  // Runic decoration along left side — angular marks suggesting Dwarvish runes
  const rng = mulberry32(42);
  const runeY = y + 30;
  const runeH = h - 60;
  const runeXL = x - 15;
  const runeXR = x + w + 15;

  function drawRuneColumn(runeX, seed) {
    const r = mulberry32(seed);
    for (let i = 0; i < 18; i++) {
      const ry = runeY + (i / 18) * runeH;
      const rw = 10 + r() * 10;
      const rh = 12 + r() * 4;
      // Vertical stroke — tall and prominent
      container.append("line")
        .attr("x1", runeX).attr("y1", ry)
        .attr("x2", runeX).attr("y2", ry + rh)
        .attr("stroke", BLUE_INK).attr("stroke-width", 1.2).attr("opacity", 0.7);
      // Cross strokes — angular, wider
      if (r() > 0.25) {
        const cy = ry + rh * (0.3 + r() * 0.4);
        container.append("line")
          .attr("x1", runeX - rw * 0.5).attr("y1", cy)
          .attr("x2", runeX + rw * 0.5).attr("y2", cy - 4)
          .attr("stroke", BLUE_INK).attr("stroke-width", 1.0).attr("opacity", 0.7);
      }
      // Diagonal stroke
      if (r() > 0.4) {
        container.append("line")
          .attr("x1", runeX).attr("y1", ry)
          .attr("x2", runeX + rw * 0.5).attr("y2", ry + rh * 0.5)
          .attr("stroke", BLUE_INK).attr("stroke-width", 1.0).attr("opacity", 0.7);
      }
      // Extra angular mark for variety
      if (r() > 0.6) {
        container.append("line")
          .attr("x1", runeX - rw * 0.25).attr("y1", ry + rh)
          .attr("x2", runeX + rw * 0.35).attr("y2", ry + rh * 0.6)
          .attr("stroke", BLUE_INK).attr("stroke-width", 0.9).attr("opacity", 0.7);
      }
    }
  }

  drawRuneColumn(runeXL, 42);
  drawRuneColumn(runeXR, 137);

  // Runes along the bottom
  function drawRuneRow(runeYPos, seed) {
    const r = mulberry32(seed);
    const runeW = w - 60;
    const startX = x + 30;
    for (let i = 0; i < 14; i++) {
      const rx = startX + (i / 14) * runeW;
      const rw = 10 + r() * 8;
      const rh = 12 + r() * 4;
      container.append("line")
        .attr("x1", rx).attr("y1", runeYPos)
        .attr("x2", rx).attr("y2", runeYPos + rh)
        .attr("stroke", BLUE_INK).attr("stroke-width", 1.2).attr("opacity", 0.7);
      if (r() > 0.3) {
        const cy = runeYPos + rh * (0.3 + r() * 0.4);
        container.append("line")
          .attr("x1", rx - rw * 0.4).attr("y1", cy)
          .attr("x2", rx + rw * 0.4).attr("y2", cy - 3)
          .attr("stroke", BLUE_INK).attr("stroke-width", 1.0).attr("opacity", 0.7);
      }
      if (r() > 0.5) {
        container.append("line")
          .attr("x1", rx).attr("y1", runeYPos)
          .attr("x2", rx + rw * 0.4).attr("y2", runeYPos + rh * 0.5)
          .attr("stroke", BLUE_INK).attr("stroke-width", 0.9).attr("opacity", 0.7);
      }
    }
  }

  drawRuneRow(y + h + 8, 271);
}

// --- Title cartouche (bottom-left, like "Thror's Map") ---
function renderCartouche(container, bounds, meta) {
  const bx = bounds.minX - 30;
  const by = bounds.maxY + 25;

  // Campaign name in italic blue
  container.append("text")
    .attr("x", bx)
    .attr("y", by)
    .attr("text-anchor", "start")
    .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
    .attr("font-size", "13px")
    .attr("font-style", "italic")
    .attr("fill", BLUE_INK)
    .attr("opacity", 0.7)
    .text(meta.campaign);

  // Region name below
  if (meta.region) {
    container.append("text")
      .attr("x", bx)
      .attr("y", by + 15)
      .attr("text-anchor", "start")
      .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
      .attr("font-size", "10px")
      .attr("font-style", "italic")
      .attr("fill", BLUE_LIGHT)
      .attr("opacity", 0.6)
      .text(meta.region + (meta.world ? ", " + meta.world : ""));
  }

  // Underline
  const textLen = meta.campaign.length * 6.5;
  container.append("line")
    .attr("x1", bx).attr("y1", by + 3)
    .attr("x2", bx + textLen).attr("y2", by + 3)
    .attr("stroke", BLUE_INK).attr("stroke-width", 0.4).attr("opacity", 0.5);
}

// --- Annotation: flowing handwritten text scattered across the map ---
function renderAnnotations(container, nodes) {
  const annotGroup = container.append("g").attr("class", "annotations");

  nodes.forEach(node => {
    const isLocal = node.scale === "local";
    if (isLocal) return; // skip local-scale nodes

    const rng = mulberry32(seedFromString(node.id + "-annotation"));
    const isDanger = node.point_type === "lair" || node.point_type === "dungeon";

    // Vary angle and distance per node for a scattered, hand-written look
    const angle = (rng() - 0.5) * Math.PI * 1.5;
    const dist = 35 + rng() * 20;

    const ax = node.x + Math.cos(angle) * dist;
    const ay = node.y + Math.sin(angle) * dist;

    // Use node description text, truncated to 35-45 chars
    let phrase;
    if (node.description) {
      const limit = 35 + Math.floor(rng() * 10); // 35-44 chars
      if (node.description.length > limit) {
        let cut = node.description.lastIndexOf(" ", limit);
        if (cut < 20) cut = limit;
        phrase = node.description.slice(0, cut) + "\u2026";
      } else {
        phrase = node.description;
      }
    } else {
      const flavorPhrases = [
        "here of old was a place of note",
        "known to few who wander far",
        "travellers rest upon this ground",
        "the road goes ever on from here"
      ];
      phrase = flavorPhrases[Math.floor(rng() * flavorPhrases.length)];
    }

    const color = isDanger ? RED_INK : BLUE_INK;
    const rotation = (rng() - 0.5) * 16; // slight angle, -8 to +8 degrees

    // Split into 2 lines if long enough
    let line1 = phrase, line2 = null;
    if (phrase.length > 24) {
      const mid = Math.floor(phrase.length / 2);
      let splitAt = phrase.lastIndexOf(" ", mid + 5);
      if (splitAt < mid - 8) splitAt = phrase.indexOf(" ", mid);
      if (splitAt > 0) {
        line1 = phrase.slice(0, splitAt);
        line2 = phrase.slice(splitAt + 1);
      }
    }

    const text = annotGroup.append("text")
      .attr("x", ax).attr("y", ay)
      .attr("text-anchor", "middle")
      .attr("transform", `rotate(${rotation}, ${ax}, ${ay})`)
      .attr("font-family", "'Palatino Linotype', serif")
      .attr("font-size", "9px")
      .attr("font-style", "italic")
      .attr("fill", color)
      .attr("stroke", PARCHMENT)
      .attr("stroke-width", 2.5)
      .attr("paint-order", "stroke");

    text.append("tspan")
      .attr("x", ax).attr("dy", 0)
      .text(line1);

    if (line2) {
      text.append("tspan")
        .attr("x", ax).attr("dy", "1.15em")
        .text(line2);
    }
  });
}

// --- Decorative dragon/beast symbol near the most dangerous node ---
function renderBeastSymbol(container, nodes) {
  // Find a lair node; fall back to dungeon
  let beast = nodes.find(n => n.point_type === "lair");
  if (!beast) beast = nodes.find(n => n.point_type === "dungeon");
  if (!beast) return;

  const rng = mulberry32(seedFromString(beast.id + "-beast"));
  // Place it offset from the node
  const angle = rng() * Math.PI * 2;
  const dist = 55 + rng() * 20;
  const bx = beast.x + Math.cos(angle) * dist;
  const by = beast.y + Math.sin(angle) * dist;

  const g = container.append("g")
    .attr("transform", `translate(${bx}, ${by}) scale(0.9)`)
    .attr("opacity", 0.6);

  // Simple dragon silhouette: serpentine body with wings
  // Body — sinuous S-curve
  g.append("path")
    .attr("d", "M 0 0 C 6 -8, 14 -4, 18 -10 C 22 -16, 28 -12, 32 -8 C 36 -4, 30 2, 24 0")
    .attr("fill", "none")
    .attr("stroke", RED_INK)
    .attr("stroke-width", 1.8)
    .attr("stroke-linecap", "round");

  // Left wing — swept back
  g.append("path")
    .attr("d", "M 14 -8 C 8 -22, 2 -26, -4 -20 C -2 -16, 4 -14, 14 -8")
    .attr("fill", RED_INK)
    .attr("opacity", 0.25)
    .attr("stroke", RED_INK)
    .attr("stroke-width", 0.8);

  // Right wing — swept forward
  g.append("path")
    .attr("d", "M 22 -12 C 28 -26, 36 -28, 40 -20 C 36 -16, 28 -14, 22 -12")
    .attr("fill", RED_INK)
    .attr("opacity", 0.25)
    .attr("stroke", RED_INK)
    .attr("stroke-width", 0.8);

  // Head — small pointed triangle
  g.append("path")
    .attr("d", "M 0 0 L -4 -3 L -2 2 Z")
    .attr("fill", RED_INK)
    .attr("opacity", 0.5);

  // Tail tip
  g.append("path")
    .attr("d", "M 24 0 C 26 4, 30 6, 34 4")
    .attr("fill", "none")
    .attr("stroke", RED_INK)
    .attr("stroke-width", 1.2)
    .attr("stroke-linecap", "round");
}

// --- Serpent/dragon marks near ALL lair nodes ---
function renderBeastMark(container, nodes) {
  const lairs = nodes.filter(n => n.point_type === "lair");
  if (!lairs.length) return;

  lairs.forEach(lair => {
    const rng = mulberry32(seedFromString(lair.id + "-beastmark"));
    const angle = rng() * Math.PI * 2;
    const dist = 50 + rng() * 25;
    const bx = lair.x + Math.cos(angle) * dist;
    const by = lair.y + Math.sin(angle) * dist;
    const flip = rng() > 0.5 ? -1 : 1;

    const g = container.append("g")
      .attr("transform", `translate(${bx}, ${by}) scale(${flip * 0.8}, 0.8)`)
      .attr("opacity", 0.5);

    // Serpentine body — sinuous S-curve
    g.append("path")
      .attr("d", "M 0 0 C 5 -10, 15 -6, 20 -12 C 25 -18, 32 -10, 28 -4")
      .attr("fill", "none")
      .attr("stroke", RED_INK)
      .attr("stroke-width", 1.6)
      .attr("stroke-linecap", "round");

    // Pointed tail
    g.append("path")
      .attr("d", "M 28 -4 C 32 0, 36 4, 40 2 L 38 5")
      .attr("fill", "none")
      .attr("stroke", RED_INK)
      .attr("stroke-width", 1.0)
      .attr("stroke-linecap", "round");

    // Small wing suggestion
    g.append("path")
      .attr("d", "M 12 -9 C 8 -20, 2 -22, -2 -16 C 2 -14, 8 -12, 12 -9")
      .attr("fill", RED_INK)
      .attr("opacity", 0.2)
      .attr("stroke", RED_INK)
      .attr("stroke-width", 0.6);
  });
}

// --- Parchment background (warmer, more aged) ---
function renderBackground(svg, defs) {
  const filter = defs.append("filter")
    .attr("id", "parchment-texture")
    .attr("x", "0%").attr("y", "0%")
    .attr("width", "100%").attr("height", "100%");

  filter.append("feTurbulence")
    .attr("type", "fractalNoise")
    .attr("baseFrequency", "0.03")
    .attr("numOctaves", "4")
    .attr("seed", "23")
    .attr("stitchTiles", "stitch")
    .attr("result", "noise");

  filter.append("feColorMatrix")
    .attr("type", "matrix")
    .attr("in", "noise")
    .attr("values", `0 0 0 0 0.941
                     0 0 0 0 0.902
                     0 0 0 0 0.800
                     0 0 0 0.3 0.7`)
    .attr("result", "colored");

  filter.append("feBlend")
    .attr("in", "SourceGraphic")
    .attr("in2", "colored")
    .attr("mode", "multiply");

  const grad = defs.append("radialGradient")
    .attr("id", "parchment-grad")
    .attr("cx", "50%").attr("cy", "50%").attr("r", "70%");
  grad.append("stop").attr("offset", "0%").attr("stop-color", PARCHMENT);
  grad.append("stop").attr("offset", "100%").attr("stop-color", PARCHMENT_DARK);

  svg.append("rect")
    .attr("width", WIDTH * 3)
    .attr("height", HEIGHT * 3)
    .attr("x", -WIDTH)
    .attr("y", -HEIGHT)
    .attr("fill", "url(#parchment-grad)")
    .attr("filter", "url(#parchment-texture)");
}

// --- Compass (minimal — just a cross with arrow, like Thror's map) ---
function renderCompass(container, x, y) {
  const g = container.append("g")
    .attr("transform", `translate(${x}, ${y})`)
    .attr("opacity", 0.5);

  const size = 15;

  // Cross
  g.append("line").attr("x1", 0).attr("y1", -size).attr("x2", 0).attr("y2", size)
    .attr("stroke", BLUE_INK).attr("stroke-width", 0.6);
  g.append("line").attr("x1", -size * 0.6).attr("y1", 0).attr("x2", size * 0.6).attr("y2", 0)
    .attr("stroke", BLUE_INK).attr("stroke-width", 0.6);

  // North arrowhead
  g.append("path")
    .attr("d", `M 0 ${-size} L 2.5 ${-size + 5} L -2.5 ${-size + 5} Z`)
    .attr("fill", BLUE_INK);

  // N
  g.append("text")
    .attr("x", 0).attr("y", -size - 4)
    .attr("text-anchor", "middle")
    .attr("font-family", "'Palatino Linotype', serif")
    .attr("font-size", "9px")
    .attr("font-style", "italic")
    .attr("fill", BLUE_INK)
    .text("N");
}

// --- Detail panel ---
let graphData = null;

function showDetail(node) {
  const panel = document.getElementById("detail-panel");
  document.getElementById("panel-name").textContent = node.name;
  document.getElementById("panel-type").textContent =
    node.point_type.charAt(0).toUpperCase() + node.point_type.slice(1) +
    (node.terrain ? " \u2022 " + node.terrain : "");
  document.getElementById("panel-desc").textContent = node.description || "";

  const connections = graphData.links.filter(l =>
    (l.source.id || l.source) === node.id || (l.target.id || l.target) === node.id
  );
  const connHTML = connections.map(l => {
    const other = (l.source.id || l.source) === node.id ? l.target : l.source;
    const name = other.name || other.id || other;
    const days = l.days ? ` (${l.days} ${l.days === 1 ? "day" : "days"})` : "";
    const type = l.path_type ? ` \u2014 ${l.path_type}` : "";
    return `<li>\u2192 ${name}${days}${type}</li>`;
  }).join("");
  document.getElementById("panel-connections").innerHTML =
    connections.length ? `<h3>Paths</h3><ul>${connHTML}</ul>` : "";

  panel.classList.add("open");
}

function closePanel() {
  document.getElementById("detail-panel").classList.remove("open");
}

// --- Main ---
async function initMap() {
  const params = new URLSearchParams(window.location.search);
  const mapFile = params.get("map") || "Basilisk.json";
  const response = await fetch(mapFile);
  graphData = await response.json();

  const nodes = graphData.nodes.filter(n => n.visible !== false);
  const nodeIds = new Set(nodes.map(n => n.id));
  const links = graphData.links.filter(l => l.visible !== false && nodeIds.has(l.source) && nodeIds.has(l.target));

  nodes.forEach(n => {
    if (n.x_hint !== undefined) n.x = n.x_hint * HINT_SCALE + WIDTH / 2;
    if (n.y_hint !== undefined) n.y = n.y_hint * HINT_SCALE + HEIGHT / 2;
  });

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(d => Math.max(40, (d.days || 1) * DAY_SCALE)))
    .force("charge", d3.forceManyBody().strength(-200))
    .force("collide", d3.forceCollide(25))
    .force("x", d3.forceX(d => (d.x_hint || 0) * HINT_SCALE + WIDTH / 2).strength(0.3))
    .force("y", d3.forceY(d => (d.y_hint || 0) * HINT_SCALE + HEIGHT / 2).strength(0.3));

  simulation.stop();
  for (let i = 0; i < 300; i++) simulation.tick();

  graphData.links = links;
  graphData.nodes = nodes;

  const svg = d3.select("#map")
    .attr("width", WIDTH)
    .attr("height", HEIGHT);

  const defs = svg.append("defs");
  const g = svg.append("g");

  const zoom = d3.zoom()
    .scaleExtent([0.3, 4])
    .on("zoom", (event) => g.attr("transform", event.transform));
  svg.call(zoom);
  svg.on("click", () => closePanel());

  const bounds = computeBounds(nodes);

  // Render layers — sparse, lots of empty parchment
  renderBackground(g, defs);
  renderRunicBorder(g, bounds);
  renderLinks(g, links);
  renderTerrainSymbols(g, nodes, links);
  renderNodes(g, nodes);
  renderLabels(g, nodes);
  renderDayLabels(g, links);
  renderAnnotations(g, nodes);
  renderBeastSymbol(g, nodes);
  renderBeastMark(g, nodes);
  renderCompass(g, bounds.maxX + 15, bounds.minY - 15);
  renderCartouche(g, bounds, graphData.meta);

  // Title bar
  document.getElementById("title-bar").textContent =
    `${graphData.meta.campaign} \u2014 ${graphData.meta.region}, ${graphData.meta.world} \u2014 ${graphData.meta.era}`;

  const cx = (bounds.minX + bounds.maxX) / 2;
  const cy = (bounds.minY + bounds.maxY) / 2;
  const initialTransform = d3.zoomIdentity
    .translate(WIDTH / 2 - cx, HEIGHT / 2 - cy);
  svg.call(zoom.transform, initialTransform);
}

function computeBounds(nodes) {
  return {
    minX: d3.min(nodes, d => d.x) - 50,
    maxX: d3.max(nodes, d => d.x) + 50,
    minY: d3.min(nodes, d => d.y) - 50,
    maxY: d3.max(nodes, d => d.y) + 50,
  };
}

initMap();
</script>
