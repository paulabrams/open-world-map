<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Point-Crawl Map — World Atlas Style</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #2a1f14;
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    overflow: hidden;
  }
  #map-container {
    width: 100vw;
    height: 100vh;
    cursor: grab;
  }
  #map-container:active { cursor: grabbing; }

  #detail-panel {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    width: 320px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    background: #f4e8d1;
    border: 2px solid #2a1f14;
    padding: 20px;
    font-size: 14px;
    color: #2a1f14;
    box-shadow: 4px 4px 12px rgba(0,0,0,0.3);
  }
  #detail-panel.open { display: block; }
  #detail-panel h2 {
    color: #8b2500;
    font-size: 18px;
    margin-bottom: 4px;
  }
  #detail-panel .point-type {
    font-style: italic;
    color: #5a4a3a;
    font-size: 12px;
    margin-bottom: 12px;
  }
  #detail-panel .description {
    line-height: 1.5;
    margin-bottom: 12px;
  }
  #detail-panel .connections {
    border-top: 1px solid #5a4a3a;
    padding-top: 10px;
    font-size: 13px;
  }
  #detail-panel .connections h3 {
    font-size: 14px;
    color: #8b2500;
    margin-bottom: 6px;
  }
  #detail-panel .connections li {
    margin-bottom: 4px;
    list-style: none;
  }
  #detail-panel .close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    cursor: pointer;
    font-size: 18px;
    color: #5a4a3a;
    background: none;
    border: none;
    font-family: inherit;
  }

  #title-bar {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: #8b2500;
    font-size: 11px;
    font-style: italic;
    opacity: 0.7;
    pointer-events: none;
  }
  #export-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 8px 16px;
    background: #f4e8d1;
    border: 2px solid #2a1f14;
    font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
    font-size: 13px;
    color: #2a1f14;
    cursor: pointer;
    opacity: 0.8;
  }
  #export-btn:hover { opacity: 1; }
</style>
</head>
<body>

<div id="map-container">
  <svg id="map"></svg>
</div>

<div id="detail-panel">
  <button class="close-btn" onclick="closePanel()">&times;</button>
  <h2 id="panel-name"></h2>
  <div class="point-type" id="panel-type"></div>
  <div class="description" id="panel-desc"></div>
  <div class="connections" id="panel-connections"></div>
</div>

<div id="title-bar"></div>
<button id="export-btn" onclick="exportSVG()">Save SVG</button>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
// --- World Atlas Style Constants ---
// Dense, engraving-like. Christopher Tolkien published map aesthetic.
const INK = "#1a1610";
const INK_MID = "#3a3428";
const INK_LIGHT = "#5a4a3a";
const LABEL_RED = "#8b2500";
const REGION_RED = "#a03520";
const PARCHMENT = "#f4e8d1";
const PARCHMENT_DARK = "#d4c4a0";

const WIDTH = window.innerWidth;
const HEIGHT = window.innerHeight;
const HINT_SCALE = 100; // 1 unit = 1 inch on the hand-drawn 8.5x11 map
const DAY_SCALE = 100;

// --- Seeded random ---
function mulberry32(a) {
  return function() {
    a |= 0; a = a + 0x6D2B79F5 | 0;
    let t = Math.imul(a ^ a >>> 15, 1 | a);
    t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
    return ((t ^ t >>> 14) >>> 0) / 4294967296;
  };
}
function seedFromString(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = ((h << 5) - h + s.charCodeAt(i)) | 0;
  return h;
}

// --- Terrain Symbol Generators (dense, engraving style) ---

function drawMountainRange(g, x, y, size, rng) {
  const w = size * (0.8 + rng() * 0.4);
  const h = size * (1.3 + rng() * 0.5);
  const skew = (rng() - 0.5) * w * 0.1;
  const peakX = x + skew;
  const peakY = y - h;

  // Solid shadow side (left half)
  g.append("path")
    .attr("d", `M ${x - w/2} ${y} L ${peakX} ${peakY} L ${x} ${y} Z`)
    .attr("fill", INK)
    .attr("stroke", "none");

  // Light side outline (right half)
  g.append("path")
    .attr("d", `M ${x} ${y} L ${peakX} ${peakY} L ${x + w/2} ${y}`)
    .attr("fill", "none")
    .attr("stroke", INK)
    .attr("stroke-width", 1.0);

  // Ridge detail lines on light side
  const ridgeCount = 2 + Math.floor(rng() * 2);
  for (let i = 1; i <= ridgeCount; i++) {
    const t = i / (ridgeCount + 1);
    const rx = peakX + (x + w/2 - peakX) * t;
    const ry = peakY + (y - peakY) * t;
    const lineLen = w * 0.12 * t;
    g.append("line")
      .attr("x1", rx - lineLen * 0.5).attr("y1", ry)
      .attr("x2", rx + lineLen * 0.5).attr("y2", ry + lineLen * 0.4)
      .attr("stroke", INK)
      .attr("stroke-width", 0.5)
      .attr("opacity", 0.6);
  }

  // Scree dots at base
  const dotCount = 5 + Math.floor(rng() * 5);
  for (let i = 0; i < dotCount; i++) {
    g.append("circle")
      .attr("cx", x + (rng() - 0.5) * w * 1.0)
      .attr("cy", y + 1 + rng() * 4)
      .attr("r", 0.5 + rng() * 0.6)
      .attr("fill", INK)
      .attr("opacity", 0.55);
  }
}

function drawForestHatch(g, x, y, size, rng) {
  const rx = size * (0.35 + rng() * 0.15);
  const ry = size * (0.45 + rng() * 0.15);

  // Hatching lines within canopy — dense
  const hatchCount = 7 + Math.floor(rng() * 3);
  for (let i = 0; i < hatchCount; i++) {
    const t = (i + 0.5) / hatchCount;
    const ly = y - ry + t * ry * 2;
    const dyNorm = (ly - y) / ry;
    const hWidth = rx * Math.sqrt(Math.max(0, 1 - dyNorm * dyNorm));
    if (hWidth > 0.5) {
      g.append("line")
        .attr("x1", x - hWidth).attr("y1", ly)
        .attr("x2", x + hWidth).attr("y2", ly)
        .attr("stroke", INK)
        .attr("stroke-width", 0.5)
        .attr("opacity", 0.9);
    }
  }

  // Outline
  g.append("ellipse")
    .attr("cx", x).attr("cy", y)
    .attr("rx", rx).attr("ry", ry)
    .attr("fill", "none")
    .attr("stroke", INK)
    .attr("stroke-width", 0.8)
    .attr("opacity", 0.8);
}

function drawSwampLines(g, x, y, size, rng) {
  for (let i = 0; i < 5; i++) {
    const ly = y + (i - 2) * size * 0.2;
    const lx = x - size * 0.5;
    const segments = 4;
    let d = `M ${lx} ${ly}`;
    for (let j = 1; j <= segments; j++) {
      const sx = lx + (j / segments) * size;
      const dir = j % 2 === 0 ? -1 : 1;
      const cpx = lx + ((j - 0.5) / segments) * size;
      const cpy = ly + dir * size * 0.06;
      d += ` Q ${cpx} ${cpy} ${sx} ${ly}`;
    }
    g.append("path")
      .attr("d", d)
      .attr("fill", "none")
      .attr("stroke", INK)
      .attr("stroke-width", 0.5)
      .attr("opacity", 0.4);
  }
  for (let i = 0; i < 4; i++) {
    const rx = x - size * 0.3 + rng() * size * 0.6;
    const ry = y - size * 0.1;
    g.append("line")
      .attr("x1", rx).attr("y1", ry)
      .attr("x2", rx + (rng() - 0.5) * 2).attr("y2", ry - size * 0.35)
      .attr("stroke", INK)
      .attr("stroke-width", 0.5)
      .attr("opacity", 0.5);
  }
}

function drawGrassStipple(g, x, y, size, rng) {
  const count = 12 + Math.floor(rng() * 7);
  for (let i = 0; i < count; i++) {
    g.append("circle")
      .attr("cx", x + (rng() - 0.5) * size * 1.2)
      .attr("cy", y + (rng() - 0.5) * size * 0.8)
      .attr("r", 0.7 + rng() * 0.5)
      .attr("fill", INK)
      .attr("opacity", 0.4);
  }
}

// --- Terrain placement (dense, multiple clusters) ---
function renderTerrainSymbols(container, nodes, links) {
  const terrainGroup = container.append("g").attr("class", "terrain");

  nodes.forEach(node => {
    const rng = mulberry32(seedFromString(node.id));

    const connected = links.filter(l =>
      (l.source.id || l.source) === node.id || (l.target.id || l.target) === node.id
    );
    let avgAngle = -Math.PI / 2;
    if (connected.length > 0) {
      let sx = 0, sy = 0;
      connected.forEach(l => {
        const other = (l.source.id || l.source) === node.id ? l.target : l.source;
        if (other.x !== undefined) {
          sx += other.x - node.x;
          sy += other.y - node.y;
        }
      });
      avgAngle = Math.atan2(sy, sx);
    }
    const placeAngle = avgAngle + Math.PI;
    const offset = 42;

    if (node.terrain === "mountains") {
      // Front row: 5-7 peaks, dense overlapping
      const count = 5 + Math.floor(rng() * 3);
      for (let i = 0; i < count; i++) {
        const spread = (i - (count - 1) / 2) * 16;
        const mx = node.x + Math.cos(placeAngle) * offset + Math.cos(placeAngle + Math.PI / 2) * spread;
        const my = node.y + Math.sin(placeAngle) * offset + Math.sin(placeAngle + Math.PI / 2) * spread;
        drawMountainRange(terrainGroup, mx, my, 11 + rng() * 5, rng);
      }
      // Second row: ALWAYS present, 3-5 smaller peaks behind
      const count2 = 3 + Math.floor(rng() * 3);
      for (let i = 0; i < count2; i++) {
        const spread = (i - (count2 - 1) / 2) * 16 + (rng() - 0.5) * 6;
        const mx = node.x + Math.cos(placeAngle) * (offset + 18) + Math.cos(placeAngle + Math.PI / 2) * spread;
        const my = node.y + Math.sin(placeAngle) * (offset + 18) + Math.sin(placeAngle + Math.PI / 2) * spread;
        drawMountainRange(terrainGroup, mx, my, 8 + rng() * 4, rng);
      }
      // Third row: 2-3 tiny peaks for extra depth
      const count3 = 2 + Math.floor(rng() * 2);
      for (let i = 0; i < count3; i++) {
        const spread = (i - (count3 - 1) / 2) * 16 + (rng() - 0.5) * 8;
        const mx = node.x + Math.cos(placeAngle) * (offset + 34) + Math.cos(placeAngle + Math.PI / 2) * spread;
        const my = node.y + Math.sin(placeAngle) * (offset + 34) + Math.sin(placeAngle + Math.PI / 2) * spread;
        drawMountainRange(terrainGroup, mx, my, 5 + rng() * 3, rng);
      }
      // Extra scattered tiny peaks further out
      const extraCount = 2 + Math.floor(rng() * 3);
      for (let i = 0; i < extraCount; i++) {
        const a = placeAngle + (rng() - 0.5) * 1.6;
        const r = offset + 40 + rng() * 15;
        const mx = node.x + Math.cos(a) * r;
        const my = node.y + Math.sin(a) * r;
        drawMountainRange(terrainGroup, mx, my, 5 + rng() * 3, rng);
      }
    } else if (node.terrain === "forest") {
      const count = 10 + Math.floor(rng() * 6);
      for (let i = 0; i < count; i++) {
        const a = placeAngle + (rng() - 0.5) * 1.6;
        const r = offset * (0.3 + rng() * 0.7);
        const tx = node.x + Math.cos(a) * r;
        const ty = node.y + Math.sin(a) * r;
        drawForestHatch(terrainGroup, tx, ty, 8 + rng() * 4, rng);
      }
    } else if (node.terrain === "swamp") {
      drawSwampLines(terrainGroup,
        node.x + Math.cos(placeAngle) * offset,
        node.y + Math.sin(placeAngle) * offset, 22, rng);
    } else if (node.terrain === "plains") {
      for (let i = 0; i < 4; i++) {
        const a = placeAngle + (rng() - 0.5) * 1.4;
        const r = offset * (0.5 + rng() * 0.6);
        drawGrassStipple(terrainGroup, node.x + Math.cos(a) * r, node.y + Math.sin(a) * r, 15, rng);
      }
    }
  });
}

// --- Node icons ---
function renderNodes(container, nodes) {
  const nodeGroup = container.append("g").attr("class", "nodes");

  nodes.forEach(node => {
    const g = nodeGroup.append("g")
      .attr("transform", `translate(${node.x}, ${node.y})`)
      .attr("class", "node")
      .style("cursor", "pointer")
      .on("click", (event) => { event.stopPropagation(); showDetail(node); });

    const isLocal = node.scale === "local";
    const s = isLocal ? 3 : 5;

    // Farm override — cute farmhouse for any farm-named node
    if (node.name && node.name.toLowerCase().includes("farm")) {
      // House body
      g.append("rect").attr("x", -s).attr("y", -s*0.5).attr("width", s*2).attr("height", s*1.5)
        .attr("fill", INK).attr("stroke", "none");
      // Roof (triangle)
      g.append("path")
        .attr("d", `M ${-s-1} ${-s*0.5} L 0 ${-s*1.5} L ${s+1} ${-s*0.5} Z`)
        .attr("fill", INK).attr("stroke", "none");
      // Chimney
      g.append("rect").attr("x", s*0.3).attr("y", -s*1.3).attr("width", s*0.4).attr("height", s*0.5)
        .attr("fill", INK).attr("stroke", "none");
      // Door
      g.append("rect").attr("x", -s*0.25).attr("y", s*0.1).attr("width", s*0.5).attr("height", s*0.9)
        .attr("fill", PARCHMENT).attr("stroke", "none");
      // Small field lines to the right
      for (let fi = 0; fi < 3; fi++) {
        g.append("line")
          .attr("x1", s + 3 + fi * 3).attr("y1", s*0.5)
          .attr("x2", s + 3 + fi * 3).attr("y2", s*1.0)
          .attr("stroke", INK).attr("stroke-width", 0.5).attr("opacity", 0.5);
      }
    } else switch (node.point_type) {
      case "heart":
        g.append("circle").attr("r", 7).attr("fill", INK).attr("stroke", "none");
        g.append("circle").attr("r", 9).attr("fill", "none").attr("stroke", INK).attr("stroke-width", 1.5);
        break;
      case "fortress":
        g.append("rect").attr("x", -s).attr("y", -s).attr("width", s*2).attr("height", s*2)
          .attr("fill", INK).attr("stroke", "none");
        for (let i = -1; i <= 1; i++) {
          g.append("rect").attr("x", i * s * 0.7 - 1.5).attr("y", -s - 3).attr("width", 3).attr("height", 3)
            .attr("fill", INK);
        }
        break;
      case "tavern": {
        const hs = isLocal ? 2 : 3.5;
        // Building body (filled)
        g.append("rect").attr("x", -hs*0.7).attr("y", -hs*0.3).attr("width", hs*1.4).attr("height", hs)
          .attr("fill", INK).attr("stroke", "none");
        // Roof (filled)
        g.append("path")
          .attr("d", `M ${-hs*0.8} ${-hs*0.3} L 0 ${-hs*1.1} L ${hs*0.8} ${-hs*0.3} Z`)
          .attr("fill", INK).attr("stroke", "none");
        // Hanging sign
        g.append("line").attr("x1", hs*0.7).attr("y1", -hs*0.1).attr("x2", hs*1.2).attr("y2", -hs*0.1)
          .attr("stroke", INK).attr("stroke-width", 0.5);
        g.append("rect").attr("x", hs*1.0).attr("y", -hs*0.1).attr("width", hs*0.5).attr("height", hs*0.4)
          .attr("fill", INK).attr("stroke", "none").attr("opacity", 0.6);
        break;
      }
      case "settlement": {
        // Cluster of 2-3 tiny filled houses
        const hs = isLocal ? 2 : 3.5;
        const houseCount = isLocal ? 2 : 3;
        for (let hi = 0; hi < houseCount; hi++) {
          const hx = (hi - (houseCount-1)/2) * hs * 1.4;
          const hy = (hi % 2) * hs * 0.3;
          // House body (filled)
          g.append("rect").attr("x", hx - hs*0.6).attr("y", hy - hs*0.3).attr("width", hs*1.2).attr("height", hs*0.9)
            .attr("fill", INK).attr("stroke", "none");
          // Roof (filled)
          g.append("path")
            .attr("d", `M ${hx - hs*0.7} ${hy - hs*0.3} L ${hx} ${hy - hs} L ${hx + hs*0.7} ${hy - hs*0.3} Z`)
            .attr("fill", INK).attr("stroke", "none");
        }
        break;
      }
      case "wilderness":
        g.append("circle").attr("r", s).attr("fill", "none").attr("stroke", INK).attr("stroke-width", 1.5);
        break;
      case "dungeon": {
        const dd = s * 1.3;
        g.append("path")
          .attr("d", `M 0 ${-dd} L ${dd} 0 L 0 ${dd} L ${-dd} 0 Z`)
          .attr("fill", INK).attr("stroke", "none");
        break;
      }
      case "sanctuary":
        g.append("circle").attr("r", s).attr("fill", "none").attr("stroke", INK).attr("stroke-width", 1.5);
        g.append("circle").attr("r", 2).attr("fill", INK);
        break;
      case "tower":
        g.append("rect").attr("x", -2).attr("y", -s - 2).attr("width", 4).attr("height", s * 2 + 4)
          .attr("fill", INK).attr("stroke", "none");
        g.append("rect").attr("x", -3.5).attr("y", -s - 4).attr("width", 7).attr("height", 2)
          .attr("fill", INK);
        break;
      case "ruin":
        g.append("rect").attr("x", -s).attr("y", -s).attr("width", s*2).attr("height", s*2)
          .attr("fill", "none").attr("stroke", INK).attr("stroke-width", 1.2)
          .attr("stroke-dasharray", "2 2");
        break;
      case "waypoint":
        g.append("path")
          .attr("d", `M 0 ${-s} L ${s} ${s} L ${-s} ${s} Z`)
          .attr("fill", "none").attr("stroke", INK).attr("stroke-width", 1.2);
        break;
      case "lair":
        g.append("path")
          .attr("d", `M 0 ${-s} L ${s} ${s} L ${-s} ${s} Z`)
          .attr("fill", INK).attr("stroke", "none");
        break;
      default:
        g.append("circle").attr("r", 4).attr("fill", INK);
    }
  });
}

// --- Links ---
function renderLinks(container, links) {
  const linkGroup = container.append("g").attr("class", "links");

  links.forEach(link => {
    const sx = link.source.x, sy = link.source.y;
    const tx = link.target.x, ty = link.target.y;

    const dx = tx - sx, dy = ty - sy;
    const len = Math.sqrt(dx * dx + dy * dy);
    const rng = mulberry32(seedFromString(link.name || "link"));
    const curvature = (rng() - 0.5) * len * 0.15;
    const nx = -dy / len, ny = dx / len;
    const cx = (sx + tx) / 2 + nx * curvature;
    const cy = (sy + ty) / 2 + ny * curvature;

    if (link.path_type === "river") {
      // Double-line river channel (Tolkien style: two parallel bank lines)
      const segments = 20;
      const spine = [];
      for (let i = 0; i <= segments; i++) {
        const t = i / segments;
        // Point on the base quadratic bezier
        const bx = (1 - t) * (1 - t) * sx + 2 * (1 - t) * t * cx + t * t * tx;
        const by = (1 - t) * (1 - t) * sy + 2 * (1 - t) * t * cy + t * t * ty;
        // Add sinuous wobble
        const wave = Math.sin(t * Math.PI * 3) * 4;
        spine.push({ x: bx + nx * wave, y: by + ny * wave });
      }

      // Offset spine into two banks
      const bankWidth = 3.5;
      function offsetBank(pts, sign) {
        const result = [];
        for (let i = 0; i < pts.length; i++) {
          let lnx, lny;
          if (i === 0) {
            lnx = pts[1].x - pts[0].x; lny = pts[1].y - pts[0].y;
          } else if (i === pts.length - 1) {
            lnx = pts[i].x - pts[i - 1].x; lny = pts[i].y - pts[i - 1].y;
          } else {
            lnx = pts[i + 1].x - pts[i - 1].x; lny = pts[i + 1].y - pts[i - 1].y;
          }
          const ll = Math.sqrt(lnx * lnx + lny * lny) || 1;
          result.push({ x: pts[i].x + sign * (-lny / ll) * bankWidth, y: pts[i].y + sign * (lnx / ll) * bankWidth });
        }
        return result;
      }

      const leftBank = offsetBank(spine, 1);
      const rightBank = offsetBank(spine, -1);

      const lineGen = d3.line().x(d => d.x).y(d => d.y).curve(d3.curveBasis);

      linkGroup.append("path")
        .attr("d", lineGen(leftBank))
        .attr("fill", "none")
        .attr("stroke", INK)
        .attr("stroke-width", 1.2)
        .attr("stroke-linecap", "round")
        .attr("opacity", 0.7);

      linkGroup.append("path")
        .attr("d", lineGen(rightBank))
        .attr("fill", "none")
        .attr("stroke", INK)
        .attr("stroke-width", 1.2)
        .attr("stroke-linecap", "round")
        .attr("opacity", 0.7);

      return;
    }

    const pathD = `M ${sx} ${sy} Q ${cx} ${cy} ${tx} ${ty}`;

    const path = linkGroup.append("path")
      .attr("d", pathD)
      .attr("fill", "none")
      .attr("stroke", INK)
      .attr("stroke-linecap", "round");

    switch (link.path_type) {
      case "road":
        path.attr("stroke-width", 3.0);
        break;
      case "trail":
        path.attr("stroke-width", 2.0).attr("stroke-dasharray", "8 4");
        break;
      case "wilderness":
        path.attr("stroke-width", 1.2).attr("stroke-dasharray", "3 5");
        break;
      default:
        path.attr("stroke-width", 1.5);
    }
  });
}

// --- Day labels ---
function renderDayLabels(container, links) {
  const labelGroup = container.append("g").attr("class", "day-labels");

  links.forEach(link => {
    if (!link.days || link.days < 0.25 || link.path_type === "river") return;

    const sx = link.source.x, sy = link.source.y;
    const tx = link.target.x, ty = link.target.y;
    const mx = (sx + tx) / 2, my = (sy + ty) / 2;

    const text = link.days === 1 ? "1 day" : link.days + " days";

    labelGroup.append("text")
      .attr("x", mx)
      .attr("y", my + 3)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
      .attr("font-size", "9px")
      .attr("fill", INK_LIGHT)
      .attr("stroke", PARCHMENT)
      .attr("stroke-width", 2.5)
      .attr("paint-order", "stroke")
      .text(text);
  });
}

// --- Labels (red, letter-spaced for important places) ---
function renderLabels(container, nodes) {
  const labelGroup = container.append("g").attr("class", "labels");

  nodes.forEach(node => {
    const isLocal = node.scale === "local";
    const isRegion = node.point_type === "heart" || node.point_type === "fortress";
    const fontSize = isLocal ? 10 : (isRegion ? 16 : 13);
    const fontWeight = isRegion ? "bold" : "normal";
    const color = isLocal ? INK_LIGHT : LABEL_RED;
    const yOffset = isLocal ? 14 : 20;

    const text = labelGroup.append("text")
      .attr("x", node.x)
      .attr("y", node.y + yOffset)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
      .attr("font-size", fontSize + "px")
      .attr("font-weight", fontWeight)
      .attr("fill", color)
      .attr("stroke", PARCHMENT)
      .attr("stroke-width", 3)
      .attr("paint-order", "stroke")
      .text(node.name);

    if (isRegion && !isLocal) {
      text.attr("letter-spacing", "3px");
    }
  });
}

function renderRegionLabels(container, nodes, meta) {
  const regionLabelGroup = container.append("g").attr("class", "region-labels");

  // Large spread-out labels for heart/fortress nodes (major regions)
  nodes.forEach(node => {
    if (node.point_type !== "heart" && node.point_type !== "fortress") return;
    if (node.scale === "local") return;

    regionLabelGroup.append("text")
      .attr("x", node.x)
      .attr("y", node.y - 35)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
      .attr("font-size", "24px")
      .attr("font-weight", "normal")
      .attr("letter-spacing", "10px")
      .attr("text-transform", "uppercase")
      .attr("fill", LABEL_RED)
      .attr("opacity", 0.15)
      .text(node.name.toUpperCase());
  });

  // Campaign region name centered on the map
  if (meta && meta.region) {
    const cx = d3.mean(nodes, d => d.x);
    const cy = d3.mean(nodes, d => d.y);

    regionLabelGroup.append("text")
      .attr("x", cx)
      .attr("y", cy)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
      .attr("font-size", "32px")
      .attr("font-weight", "normal")
      .attr("letter-spacing", "15px")
      .attr("text-transform", "uppercase")
      .attr("fill", LABEL_RED)
      .attr("opacity", 0.12)
      .text(meta.region.toUpperCase());
  }
}

// --- Parchment background ---
function renderBackground(svg, defs) {
  const filter = defs.append("filter")
    .attr("id", "parchment-texture")
    .attr("x", "0%").attr("y", "0%")
    .attr("width", "100%").attr("height", "100%");

  filter.append("feTurbulence")
    .attr("type", "fractalNoise")
    .attr("baseFrequency", "0.035")
    .attr("numOctaves", "4")
    .attr("seed", "15")
    .attr("stitchTiles", "stitch")
    .attr("result", "noise");

  filter.append("feColorMatrix")
    .attr("type", "matrix")
    .attr("in", "noise")
    .attr("values", `0 0 0 0 0.957
                     0 0 0 0 0.910
                     0 0 0 0 0.820
                     0 0 0 0.4 0.6`)
    .attr("result", "colored");

  filter.append("feBlend")
    .attr("in", "SourceGraphic")
    .attr("in2", "colored")
    .attr("mode", "multiply");

  const grad = defs.append("radialGradient")
    .attr("id", "parchment-grad")
    .attr("cx", "50%").attr("cy", "50%").attr("r", "70%");
  grad.append("stop").attr("offset", "0%").attr("stop-color", PARCHMENT);
  grad.append("stop").attr("offset", "100%").attr("stop-color", PARCHMENT_DARK);

  svg.append("rect")
    .attr("width", WIDTH * 3)
    .attr("height", HEIGHT * 3)
    .attr("x", -WIDTH)
    .attr("y", -HEIGHT)
    .attr("fill", "url(#parchment-grad)")
    .attr("filter", "url(#parchment-texture)");
}

// --- Ornate compass rose (red, like the published map) ---
function renderCompass(container, x, y) {
  const g = container.append("g")
    .attr("transform", `translate(${x}, ${y})`)
    .attr("opacity", 0.75);

  const size = 40;

  // Outer circles
  g.append("circle").attr("r", size * 1.2)
    .attr("fill", "none").attr("stroke", LABEL_RED).attr("stroke-width", 1.0);
  g.append("circle").attr("r", size * 1.15)
    .attr("fill", "none").attr("stroke", LABEL_RED).attr("stroke-width", 0.4);

  // North (filled red)
  g.append("path")
    .attr("d", `M 0 ${-size} L ${size * 0.12} ${-size * 0.2} L 0 ${-size * 0.1} L ${-size * 0.12} ${-size * 0.2} Z`)
    .attr("fill", LABEL_RED);
  // South
  g.append("path")
    .attr("d", `M 0 ${size} L ${size * 0.12} ${size * 0.2} L 0 ${size * 0.1} L ${-size * 0.12} ${size * 0.2} Z`)
    .attr("fill", "none").attr("stroke", LABEL_RED).attr("stroke-width", 0.8);
  // East
  g.append("path")
    .attr("d", `M ${size} 0 L ${size * 0.2} ${-size * 0.12} L ${size * 0.1} 0 L ${size * 0.2} ${size * 0.12} Z`)
    .attr("fill", "none").attr("stroke", LABEL_RED).attr("stroke-width", 0.8);
  // West
  g.append("path")
    .attr("d", `M ${-size} 0 L ${-size * 0.2} ${-size * 0.12} L ${-size * 0.1} 0 L ${-size * 0.2} ${size * 0.12} Z`)
    .attr("fill", "none").attr("stroke", LABEL_RED).attr("stroke-width", 0.8);

  // Intercardinal lines
  const ic = size * 0.6;
  const diag = ic * 0.707;
  [[diag, -diag], [diag, diag], [-diag, diag], [-diag, -diag]].forEach(([dx, dy]) => {
    g.append("line")
      .attr("x1", dx * 0.15).attr("y1", dy * 0.15)
      .attr("x2", dx).attr("y2", dy)
      .attr("stroke", LABEL_RED).attr("stroke-width", 0.5);
  });

  // Cardinal labels
  [["N", 0, -size - 8], ["S", 0, size + 12], ["E", size + 8, 4], ["W", -size - 8, 4]].forEach(([t, lx, ly]) => {
    g.append("text")
      .attr("x", lx).attr("y", ly)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', serif")
      .attr("font-size", "11px")
      .attr("font-weight", "bold")
      .attr("fill", LABEL_RED)
      .text(t);
  });
}

// --- Title cartouche (ornate box, bottom-left) ---
function renderCartouche(container, bounds, meta) {
  const boxW = 200;
  const boxH = 70;
  const bx = bounds.minX - 20;
  const by = bounds.maxY - boxH + 30;

  container.append("rect")
    .attr("x", bx).attr("y", by)
    .attr("width", boxW).attr("height", boxH)
    .attr("fill", PARCHMENT)
    .attr("stroke", INK)
    .attr("stroke-width", 1.5);

  container.append("rect")
    .attr("x", bx + 3).attr("y", by + 3)
    .attr("width", boxW - 6).attr("height", boxH - 6)
    .attr("fill", "none")
    .attr("stroke", INK)
    .attr("stroke-width", 0.5);

  container.append("line")
    .attr("x1", bx + 20).attr("y1", by + 35)
    .attr("x2", bx + boxW - 20).attr("y2", by + 35)
    .attr("stroke", INK).attr("stroke-width", 0.4);

  container.append("text")
    .attr("x", bx + boxW / 2)
    .attr("y", by + 28)
    .attr("text-anchor", "middle")
    .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
    .attr("font-size", "15px")
    .attr("font-weight", "bold")
    .attr("letter-spacing", "3px")
    .attr("fill", INK)
    .text(meta.region ? meta.region.toUpperCase() : meta.campaign.toUpperCase());

  container.append("text")
    .attr("x", bx + boxW / 2)
    .attr("y", by + 50)
    .attr("text-anchor", "middle")
    .attr("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif")
    .attr("font-size", "9px")
    .attr("font-style", "italic")
    .attr("fill", INK_LIGHT)
    .text(meta.world + (meta.era ? " \u2014 " + meta.era : ""));

  if (meta.world) {
    container.append("text")
      .attr("x", bx + boxW / 2)
      .attr("y", by + 62)
      .attr("text-anchor", "middle")
      .attr("font-family", "'Palatino Linotype', serif")
      .attr("font-size", "7px")
      .attr("font-style", "italic")
      .attr("fill", INK_LIGHT)
      .attr("opacity", 0.6)
      .text("A Map of " + (meta.region || meta.campaign));
  }
}

// --- Detail panel ---
let graphData = null;

function showDetail(node) {
  const panel = document.getElementById("detail-panel");
  document.getElementById("panel-name").textContent = node.name;
  document.getElementById("panel-type").textContent =
    node.point_type.charAt(0).toUpperCase() + node.point_type.slice(1) +
    (node.terrain ? " \u2022 " + node.terrain : "");
  document.getElementById("panel-desc").textContent = node.description || "";

  const connections = graphData.links.filter(l =>
    (l.source.id || l.source) === node.id || (l.target.id || l.target) === node.id
  );
  const connHTML = connections.map(l => {
    const other = (l.source.id || l.source) === node.id ? l.target : l.source;
    const name = other.name || other.id || other;
    const days = l.days ? ` (${l.days} ${l.days === 1 ? "day" : "days"})` : "";
    const type = l.path_type ? ` \u2014 ${l.path_type}` : "";
    return `<li>\u2192 ${name}${days}${type}</li>`;
  }).join("");
  document.getElementById("panel-connections").innerHTML =
    connections.length ? `<h3>Paths</h3><ul>${connHTML}</ul>` : "";

  panel.classList.add("open");
}

function closePanel() {
  document.getElementById("detail-panel").classList.remove("open");
}

// --- Main ---
async function initMap() {
  const params = new URLSearchParams(window.location.search);
  const campaign = params.get("map")?.replace(/\.json$/, "") || "Basilisk";
  const mapFile = campaign + "/" + campaign + ".json";
  const response = await fetch(mapFile);
  graphData = await response.json();

  const nodes = graphData.nodes.filter(n => n.visible !== false);
  const nodeIds = new Set(nodes.map(n => n.id));
  const links = graphData.links.filter(l => l.visible !== false && nodeIds.has(l.source) && nodeIds.has(l.target));

  nodes.forEach(n => {
    if (n.x_hint !== undefined) n.x = n.x_hint * HINT_SCALE + WIDTH / 2;
    if (n.y_hint !== undefined) n.y = n.y_hint * HINT_SCALE + HEIGHT / 2;
  });

  const simulation = d3.forceSimulation(nodes)
    .force("link", d3.forceLink(links).id(d => d.id).distance(d => Math.max(40, (d.days || 1) * DAY_SCALE)).strength(0.05))
    .force("charge", d3.forceManyBody().strength(-50))
    .force("collide", d3.forceCollide(15))
    .force("x", d3.forceX(d => (d.x_hint || 0) * HINT_SCALE + WIDTH / 2).strength(0.9))
    .force("y", d3.forceY(d => (d.y_hint || 0) * HINT_SCALE + HEIGHT / 2).strength(0.9));

  simulation.stop();
  for (let i = 0; i < 300; i++) simulation.tick();

  graphData.links = links;
  graphData.nodes = nodes;

  const svg = d3.select("#map")
    .attr("width", WIDTH)
    .attr("height", HEIGHT);

  const defs = svg.append("defs");
  const g = svg.append("g");

  const zoom = d3.zoom()
    .scaleExtent([0.3, 4])
    .on("zoom", (event) => g.attr("transform", event.transform));
  svg.call(zoom);
  svg.on("click", () => closePanel());

  const bounds = computeBounds(nodes);

  // Render layers
  renderBackground(g, defs);
  renderLinks(g, links);
  renderTerrainSymbols(g, nodes, links);
  renderNodes(g, nodes);
  renderRegionLabels(g, nodes, graphData.meta);
  renderLabels(g, nodes);
  renderDayLabels(g, links);
  renderCompass(g, bounds.maxX + 70, bounds.minY - 30);
  renderCartouche(g, bounds, graphData.meta);

  // Title bar
  document.getElementById("title-bar").textContent =
    `${graphData.meta.campaign} \u2014 ${graphData.meta.region}, ${graphData.meta.world} \u2014 ${graphData.meta.era}`;

  const cx = (bounds.minX + bounds.maxX) / 2;
  const cy = (bounds.minY + bounds.maxY) / 2;
  const initialTransform = d3.zoomIdentity
    .translate(WIDTH / 2 - cx, HEIGHT / 2 - cy);
  svg.call(zoom.transform, initialTransform);
}

function computeBounds(nodes) {
  return {
    minX: d3.min(nodes, d => d.x) - 50,
    maxX: d3.max(nodes, d => d.x) + 50,
    minY: d3.min(nodes, d => d.y) - 50,
    maxY: d3.max(nodes, d => d.y) + 50,
  };
}

function exportSVG() {
  const svgEl = document.getElementById("map");
  const clone = svgEl.cloneNode(true);

  // Compute bounds from content groups only (skip the oversized background rect)
  const g = svgEl.querySelector("g");
  const contentSelectors = [".links", ".terrain", ".nodes", ".labels", ".day-labels"];
  let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
  contentSelectors.forEach(sel => {
    const el = g.querySelector(sel);
    if (!el) return;
    const bb = el.getBBox();
    minX = Math.min(minX, bb.x);
    minY = Math.min(minY, bb.y);
    maxX = Math.max(maxX, bb.x + bb.width);
    maxY = Math.max(maxY, bb.y + bb.height);
  });
  const pad = 80;
  const vbX = minX - pad, vbY = minY - pad;
  const vbW = maxX - minX + pad * 2, vbH = maxY - minY + pad * 2;

  clone.setAttribute("viewBox", `${vbX} ${vbY} ${vbW} ${vbH}`);
  clone.setAttribute("width", vbW);
  clone.setAttribute("height", vbH);
  // Remove the zoom transform on the top-level <g> so viewBox handles framing
  clone.querySelector("g").removeAttribute("transform");

  // Resize the background rect to match the viewBox
  const bgRect = clone.querySelector("g > rect");
  if (bgRect) {
    bgRect.setAttribute("x", vbX);
    bgRect.setAttribute("y", vbY);
    bgRect.setAttribute("width", vbW);
    bgRect.setAttribute("height", vbH);
  }

  // Inline the font-family on all text elements
  clone.querySelectorAll("text").forEach(t => {
    if (!t.getAttribute("font-family")) {
      t.setAttribute("font-family", "'Palatino Linotype', 'Book Antiqua', Palatino, serif");
    }
  });

  // Add XML namespace
  clone.setAttribute("xmlns", "http://www.w3.org/2000/svg");

  const data = new XMLSerializer().serializeToString(clone);
  const blob = new Blob([data], { type: "image/svg+xml;charset=utf-8" });
  const url = URL.createObjectURL(blob);

  const a = document.createElement("a");
  a.href = url;
  const dlCampaign = new URLSearchParams(window.location.search).get("map")?.replace(/\.json$/, "") || "Basilisk";
  a.download = dlCampaign + "-world.svg";
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
}

initMap();
</script>
