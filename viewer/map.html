<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<title>Open World Map</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IM+Fell+English:ital@0;1&family=IM+Fell+English+SC&family=Alegreya:ital,wght@0,400;0,700;1,400&family=Alegreya+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: #f4e8d1;
    color-scheme: light;
  }
  body {
    font-family: Palatino, "Palatino Linotype", "Book Antiqua", "Times New Roman", serif;
    overflow: hidden;
    -webkit-text-size-adjust: 100%;
  }
  #map-container {
    width: 100vw;
    height: 100vh;
    cursor: grab;
    touch-action: none;
  }
  #map-container:active { cursor: grabbing; }

  #detail-panel {
    display: none;
    position: fixed;
    top: 20px;
    right: 20px;
    width: 320px;
    max-height: calc(100vh - 40px);
    overflow-y: auto;
    background: var(--panel-bg, #f4e8d1);
    border: 2px solid var(--panel-border, #2a1f14);
    padding: 20px;
    font-size: 14px;
    color: var(--panel-text, #2a1f14);
    box-shadow: 4px 4px 12px rgba(0,0,0,0.3);
  }
  #detail-panel.open { display: block; }
  #detail-panel h2 {
    color: var(--panel-heading, #8b2500);
    font-size: 18px;
    margin-bottom: 4px;
  }
  #detail-panel .point-type {
    font-style: italic;
    color: var(--panel-type, #5a4a3a);
    font-size: 12px;
    margin-bottom: 12px;
  }
  #detail-panel .description {
    line-height: 1.5;
    margin-bottom: 12px;
  }
  #detail-panel .connections {
    border-top: 1px solid var(--panel-type, #5a4a3a);
    padding-top: 10px;
    font-size: 13px;
  }
  #detail-panel .connections h3 {
    font-size: 14px;
    color: var(--panel-heading, #8b2500);
    margin-bottom: 6px;
  }
  #detail-panel .connections li {
    margin-bottom: 4px;
    list-style: none;
  }
  #detail-panel .close-btn {
    position: absolute;
    top: 8px;
    right: 12px;
    cursor: pointer;
    font-size: 18px;
    color: var(--panel-type, #5a4a3a);
    background: none;
    border: none;
    font-family: inherit;
  }
  #detail-panel .hex-id {
    font-family: "SF Mono", "Monaco", "Menlo", monospace;
    font-size: 12px;
    color: var(--panel-type, #5a4a3a);
    margin-bottom: 4px;
    letter-spacing: 1px;
  }
  #detail-panel .hex-travel {
    font-size: 12px;
    color: var(--panel-type, #5a4a3a);
    margin: 4px 0 10px 0;
    line-height: 1.4;
  }
  #detail-panel .hex-travel strong {
    color: var(--panel-heading, #8b2500);
    font-weight: 600;
  }
  #detail-panel .hex-pois {
    font-size: 12px;
    line-height: 1.45;
    margin-top: 8px;
  }
  #detail-panel .hex-pois .poi { margin-bottom: 10px; }
  #detail-panel .hex-pois .poi-name {
    font-weight: bold;
    color: var(--panel-heading, #8b2500);
  }
  #detail-panel .hex-pois .poi-type {
    font-style: italic;
    color: var(--panel-type, #5a4a3a);
    font-size: 11px;
  }
  #detail-panel .hex-pois .poi-desc {
    font-size: 11px;
    opacity: 0.85;
    margin-top: 2px;
  }
  #detail-panel .hex-empty {
    font-style: italic;
    opacity: 0.6;
    font-size: 12px;
  }

  #coord-readout {
    position: fixed;
    pointer-events: none;
    padding: 2px 6px;
    font-family: "SF Mono", "Monaco", "Menlo", monospace;
    font-size: 11px;
    color: var(--panel-text, #2a1f14);
    background: rgba(244, 232, 209, 0.95);
    border: 1px solid var(--panel-border, #2a1f14);
    opacity: 0;
    transition: opacity 0.1s;
    z-index: 20;
    white-space: nowrap;
  }
  #coord-readout.visible { opacity: 1; }

  #title-bar {
    position: fixed;
    bottom: 20px;
    left: 20px;
    color: var(--title-color, #8b2500);
    font-size: 11px;
    font-style: italic;
    opacity: 0.7;
    pointer-events: none;
  }

  #export-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 8px 16px;
    background: var(--btn-bg, #f4e8d1);
    border: 2px solid var(--btn-border, #2a1f14);
    font-family: Palatino, "Palatino Linotype", "Book Antiqua", "Times New Roman", serif;
    font-size: 13px;
    color: var(--btn-text, #2a1f14);
    cursor: pointer;
    opacity: 0.8;
  }
  #export-btn:hover { opacity: 1; }

  /* --- Controls panel --- */
  #controls {
    position: fixed;
    bottom: 50px;
    left: 20px;
    display: flex;
    gap: 12px;
    align-items: center;
    z-index: 10;
  }
  #controls label {
    font-size: 11px;
    color: var(--title-color, #8b2500);
    opacity: 0.8;
  }
  #controls select {
    font-family: Palatino, "Palatino Linotype", "Book Antiqua", "Times New Roman", serif;
    font-size: 14px;
    padding: 6px 10px;
    background: var(--btn-bg, #f4e8d1);
    border: 1px solid var(--btn-border, #2a1f14);
    color: var(--btn-text, #2a1f14);
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="map-container">
  <svg id="map"></svg>
</div>

<div id="detail-panel">
  <button class="close-btn" onclick="MapCore.closePanel()">&times;</button>
  <div class="hex-id" id="panel-hex-id"></div>
  <h2 id="panel-name"></h2>
  <div class="point-type" id="panel-type"></div>
  <div class="hex-travel" id="panel-travel"></div>
  <div class="description" id="panel-desc"></div>
  <div class="hex-pois" id="panel-pois"></div>
  <div class="connections" id="panel-connections"></div>
</div>

<div id="coord-readout"></div>

<div id="controls">
  <label>Style
    <select id="style-select">
      <option value="dragonisles">Dragon Isles</option>
      <option value="wilderland" selected>Wilderland</option>
      <option value="moonletters">Moon Letters</option>
    </select>
  </label>
  <label>Renderer
    <select id="renderer-select">
      <option value="svg" selected>SVG</option>
      <option value="painted">Painted</option>
    </select>
  </label>
  <label>Overlay
    <select id="grid-select">
      <option value="none">None</option>
      <option value="square">Square (1")</option>
      <option value="hex" selected>Hex</option>
    </select>
  </label>
</div>

<div id="title-bar"></div>
<button id="export-btn" onclick="MapCore.exportSVG()">Save SVG</button>

<script src="https://d3js.org/d3.v7.min.js"></script>
<script src="https://unpkg.com/roughjs@4.6.6/bundled/rough.js"></script>
<script src="core.js"></script>
<script src="renderers/dragonisles.js"></script>
<script src="renderers/wilderland.js"></script>
<script src="renderers/thirdage.js"></script>
<script src="renderers/moonletters.js"></script>
<script src="grids/square.js"></script>
<script src="grids/hex.js"></script>
<script>
(async function init() {
  const params = new URLSearchParams(window.location.search);
  const campaign = params.get("map")?.replace(/\.json$/, "") || "Basilisk";
  let style = params.get("style") || "wilderland";
  let grid = params.get("grid") || "hex";

  // Set select values
  document.getElementById("style-select").value = style;
  document.getElementById("grid-select").value = grid;

  // Load data
  await MapCore.loadData(campaign);

  // Initial render
  updateURL();
  MapCore.renderMap(style, grid);

  // Style switcher (link colours + font; doesn't change renderer pipeline)
  document.getElementById("style-select").addEventListener("change", (e) => {
    style = e.target.value;
    if (style === "dragonisles") {
      grid = "hex";
      document.getElementById("grid-select").value = "hex";
    }
    updateURL();
    MapCore.renderMap(style, grid);
  });

  // Renderer switcher: SVG stays here; Painted navigates to painted.html
  // with the same style + grid so settings are preserved across renderers.
  document.getElementById("renderer-select").addEventListener("change", (e) => {
    if (e.target.value === "painted") {
      window.location.href = `painted.html?map=${encodeURIComponent(campaign)}&style=${encodeURIComponent(style)}&grid=${encodeURIComponent(grid)}`;
    }
  });

  // Grid toggler
  document.getElementById("grid-select").addEventListener("change", (e) => {
    grid = e.target.value;
    updateURL();
    MapCore.renderMap(style, grid);
  });

  function updateURL() {
    const url = new URL(window.location.href);
    url.searchParams.set("map", campaign);
    url.searchParams.set("style", style);
    url.searchParams.set("grid", grid);
    window.history.replaceState({}, "", url.toString());
  }
})();
</script>
</body>
</html>
